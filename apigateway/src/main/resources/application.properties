server.port=8080

spring.application.name=api-gateway

# Auth Service
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**

# Usuario Service
spring.cloud.gateway.mvc.routes[1].id=usuario-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/usuarios/**

# Membresia Service
spring.cloud.gateway.mvc.routes[2].id=membresia-service
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/membresias/**